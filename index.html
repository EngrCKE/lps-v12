<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SJTC Logistics — 2-Week Schedule (Read Only)</title>
  <style>
    :root{
      --bg:#0f2e22; --panel:#163b2c; --panel2:#1b4a37;
      --txt:#f4f1e8; --muted:#cfc8b8; --accent:#3fae73;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,Segoe UI,Roboto,Arial;background:radial-gradient(1200px 700px at 20% 10%, #1d4f39 0%, var(--bg) 60%);color:var(--txt)}
    header{position:sticky;top:0;z-index:10;background:rgba(15,46,34,.85);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.08);padding:14px}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .title{font-weight:800}
    .badge{font-size:12px;color:var(--muted);padding:4px 8px;border:1px solid rgba(255,255,255,.12);border-radius:999px}
    .spacer{flex:1}
    button{
      background: var(--panel2); color: var(--txt);
      border:1px solid rgba(255,255,255,.15); border-radius:10px;
      padding:10px 12px; cursor:pointer;
    }
    main{padding:14px;max-width:1300px;margin:0 auto}
    .panel{background:rgba(22,59,44,.92);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:12px}
    .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
    @media (max-width: 980px){.grid{grid-template-columns:repeat(2,1fr)}}
    @media (max-width: 560px){.grid{grid-template-columns:1fr}}
    .day{border:1px solid rgba(255,255,255,.12);border-radius:16px;overflow:hidden;background:rgba(255,255,255,.04);min-height:220px;display:flex;flex-direction:column}
    .dayHead{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.10)}
    .dayHead .h{font-weight:800;font-size:13px}
    .dayHead .s{color:var(--muted);font-size:12px;margin-top:2px}
    .dayBody{padding:10px 12px;display:flex;flex-direction:column;gap:8px;flex:1}
    .card{border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:10px;background:rgba(15,46,34,.35);display:flex;flex-direction:column;gap:6px}
    .line{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .pill{font-size:11px;padding:4px 8px;border-radius:999px;border:1px solid rgba(255,255,255,.14);color:var(--muted)}
    .pill.ok{border-color:rgba(63,174,115,.55);color:#d6ffe9}
    .pill.bad{border-color:rgba(217,108,108,.55);color:#ffd6d6}
    .small{font-size:12px;color:var(--muted)}
    footer{margin-top:18px;text-align:center;padding:14px;color:var(--muted);font-size:12px}
  </style>
</head>
<body>
<header>
  <div class="row">
    <div class="title">SJTC Logistics — 2-Week Schedule (Read-Only)</div>
    <span class="badge" id="range">Loading…</span>
    <div class="spacer"></div>
    <button id="btnPrev">← Prev</button>
    <button id="btnCurrent">Current 2 weeks</button>
    <button id="btnNext">Next →</button>
  </div>
</header>

<main>
  <div class="panel" id="cal"></div>
  <footer>© 2026 Focolare Carpentry / SJTC Manufacturing Inc. • Developed by <b>Engr. CK Empeynado</b></footer>
</main>

<script>
  const API_URL = "https://logistics.sjtc-kobempeynado.workers.dev/";

  const $ = id => document.getElementById(id);
  let offsetWeeks = 0;
  let BOOT = null;
  let items = [];

  const pad2 = n => String(n).padStart(2,"0");
  const ymd = d => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;

  function startOfWeekMonday(date){
    const d = new Date(date.getFullYear(),date.getMonth(),date.getDate());
    const day = d.getDay();
    const diff = (day===0 ? -6 : 1-day);
    d.setDate(d.getDate()+diff);
    d.setHours(0,0,0,0);
    return d;
  }
  const addDays = (d,n)=>{ const x=new Date(d); x.setDate(x.getDate()+n); return x; };

  function windowDates(){
    const anchor = startOfWeekMonday(new Date());
    const start = addDays(anchor, offsetWeeks*7);
    return Array.from({length:14}, (_,i)=>addDays(start,i));
  }

  function nice(d){ return d.toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"}); }

  async function api(action, payload){
    const res = await fetch(`${API_URL}?action=${encodeURIComponent(action)}`, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(payload || {})
    });
    const j = await res.json();
    if(!j.ok) throw new Error(j.error || "API error");
    return j;
  }

  function driverName(code){
    const d = (BOOT.drivers||[]).find(x=>x.DriverCode===code);
    return d ? d.DriverName : "";
  }
  function vehicleLabel(code){
    const v = (BOOT.vehicles||[]).find(x=>x.VehicleCode===code);
    return v ? v.VehicleLabel : "";
  }

  function titleFor(r){
    const p = r.Payload || {};
    if(r.Type==="Delivery") return `${p.SONumber || "SO ?"} • ${p.ClientName || ""}`.trim();
    if(r.Type==="Travel") return `${p.ClientName || ""} • ${p.Destination || ""}`.trim();
    return `${p.Purpose || "Service"} • ${p.Destination || ""}`.trim();
  }
  function subtitleFor(r){
    const p = r.Payload || {};
    if(r.Type==="Delivery") return `${p.Address || ""}`.trim();
    if(r.Type==="Travel") return `${p.Destination || ""}`.trim();
    return `${p.RequiredVehicle ? ("Vehicle: " + p.RequiredVehicle + " • ") : ""}${p.Destination || ""}`.trim();
  }

  function render(){
    const cal = $("cal");
    const dates = windowDates();
    const start = dates[0];
    const end = dates[dates.length-1];
    $("range").textContent = `${nice(start)} → ${nice(end)}`;

    const byDay = {};
    dates.forEach(d=> byDay[ymd(d)] = []);
    items.forEach(r=>{
      const k = String(r.StartDT||"").slice(0,10);
      if(byDay[k]) byDay[k].push(r);
    });

    cal.innerHTML = `<div class="grid" id="g"></div>`;
    const g = $("g");
    const todayKey = ymd(new Date());

    for(const d of dates){
      const key = ymd(d);
      const list = (byDay[key]||[]).slice().sort((a,b)=> new Date(a.StartDT) - new Date(b.StartDT));

      const day = document.createElement("div");
      day.className = "day";
      day.innerHTML = `
        <div class="dayHead">
          <div class="h">${d.toLocaleDateString(undefined,{weekday:"long"})}${key===todayKey ? " • Today" : ""}</div>
          <div class="s">${d.toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"})}</div>
        </div>
        <div class="dayBody"></div>
      `;
      const body = day.querySelector(".dayBody");

      if(!list.length){
        body.innerHTML = `<div class="small">No scheduled items.</div>`;
      } else {
        for(const r of list){
          const st = new Date(r.StartDT);
          const en = new Date(r.EndDT);
          const dName = driverName(r.DriverCode);
          const vLabel = vehicleLabel(r.VehicleCode);
          body.insertAdjacentHTML("beforeend", `
            <div class="card">
              <div class="line" style="justify-content:space-between">
                <div style="font-weight:800">${escapeHtml(titleFor(r))}</div>
                <span class="pill ${r.Status==="CANCELLED" ? "bad" : "ok"}">${escapeHtml(r.Status)}</span>
              </div>
              <div class="small">${escapeHtml(subtitleFor(r))}</div>
              <div class="line">
                <span class="pill">${escapeHtml(r.Type)}</span>
                <span class="pill">🕒 ${st.toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit"})}–${en.toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit"})}</span>
                <span class="pill">👤 ${escapeHtml(dName || r.DriverCode || "—")}</span>
                <span class="pill">🚚 ${escapeHtml(vLabel || r.VehicleCode || "—")}</span>
              </div>
            </div>
          `);
        }
      }

      g.appendChild(day);
    }
  }

  function escapeHtml(str){
    return String(str ?? "").replace(/[&<>"']/g, c=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;" }[c]));
  }

  async function load(){
    BOOT = await api("bootstrapPublic", {});
    const dates = windowDates();
    const startISO = dates[0].toISOString();
    const data = await api("publicSchedule", { startISO });
    items = data.items || [];
    render();
  }

  $("btnPrev").addEventListener("click", async ()=>{ offsetWeeks -= 2; await load(); });
  $("btnNext").addEventListener("click", async ()=>{ offsetWeeks += 2; await load(); });
  $("btnCurrent").addEventListener("click", async ()=>{ offsetWeeks = 0; await load(); });

  load().catch(e=> alert(e.message || e));
</script>
</body>
</html>
